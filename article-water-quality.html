<h2>Abstract</h2>
<p>This study evaluates water quality across public locations in New Jersey using standardized testing methods.</p>

<h2>Methods</h2>
<p>Samples were collected from five sites and analyzed using chemical test kits.</p>

<h2>Results</h2>
<p>All samples were within safe drinking limits with minor variation in mineral content.</p>

<h2>Conclusion</h2>
<p>Public water quality is generally safe but shows regional variation.</p>
