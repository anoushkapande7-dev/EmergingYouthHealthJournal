<!DOCTYPE html>
<html>
<head>
<title>Archive - YMRJ</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f7f7f7;
}

.section{
background:white;
padding:30px;
margin:20px auto;
max-width:900px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

header{
background:white;
padding:20px;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
}

.paper{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
}

input{
width:100%;
padding:10px;
margin-bottom:20px;
}
</style>
</head>

<body>

<h1>Journal Archive</h1>

<input type="text" onkeyup="searchPapers()" id="archiveSearch" placeholder="Search papers...">

<div class="paper" data-title="water quality new jersey">
<a href="article-water-quality.html">Water Quality Analysis Study</a>
</div>

<div class="paper" data-title="pediatric asthma">
Pediatric Asthma Trends
</div>

<div class="paper" data-title="healthcare accessibility">
Healthcare Accessibility Study
</div>

<script>
function searchPapers() {
  let input = document.getElementById("archiveSearch").value.toLowerCase();
  let papers = document.getElementsByClassName("paper");

  for (let i = 0; i < papers.length; i++) {
    let text = papers[i].getAttribute("data-title").toLowerCase();

    papers[i].style.display = text.includes(input) ? "" : "none";
  }
}
</script>

</body>
</html>
